<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Football Predictor</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Walk-forward model</p>
          <h1>Football Predictor</h1>
        </div>
        <div class="status">
          <span id="modelName">Loading</span>
          <span id="sourceName">No report</span>
        </div>
      </header>

      <section class="scoreboard">
        <div class="match-block">
          <label for="matchSelect">Match</label>
          <select id="matchSelect"></select>
          <div class="teams">
            <div>
              <span class="team-label">Home</span>
              <strong id="homeTeam">-</strong>
            </div>
            <div class="scoreline" id="actualScore">-</div>
            <div>
              <span class="team-label">Away</span>
              <strong id="awayTeam">-</strong>
            </div>
          </div>
        </div>
        <div class="pitch">
          <div class="pitch-line mid"></div>
          <div class="pitch-box left"></div>
          <div class="pitch-box right"></div>
          <div class="pitch-dot"></div>
          <div class="pitch-readout">
            <span id="topScore">-</span>
            <small>most likely score</small>
          </div>
        </div>
      </section>

      <section class="grid primary-grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Outcome</h2>
          </div>
          <div id="probBars" class="prob-bars"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Score Map</h2>
          </div>
          <div id="heatmap" class="heatmap"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Value</h2>
          </div>
          <div id="valueTable" class="value-table"></div>
        </article>
      </section>

      <section class="grid metrics-grid" id="metricCards"></section>

      <section class="grid lab-grid">
        <article class="panel lab-panel">
          <div class="panel-head">
            <h2>Match Lab</h2>
          </div>
          <div class="lab-controls">
            <label>
              Home
              <select id="labHomeTeam"></select>
            </label>
            <label>
              Away
              <select id="labAwayTeam"></select>
            </label>
            <label class="check-row">
              <input id="labNeutral" type="checkbox" />
              Neutral
            </label>
          </div>
          <div id="labProbBars" class="prob-bars compact"></div>
          <div id="labHeatmap" class="heatmap small"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Team Edge</h2>
          </div>
          <div id="teamCompare" class="compare-list"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Odds Lab</h2>
          </div>
          <div class="odds-grid">
            <label>
              Home odds
              <input id="labHomeOdds" type="number" min="1.01" step="0.01" value="2.40" />
            </label>
            <label>
              Draw odds
              <input id="labDrawOdds" type="number" min="1.01" step="0.01" value="3.30" />
            </label>
            <label>
              Away odds
              <input id="labAwayOdds" type="number" min="1.01" step="0.01" value="2.90" />
            </label>
            <label>
              Bankroll
              <input id="labBankroll" type="number" min="1" step="10" value="1000" />
            </label>
          </div>
          <div id="labValueTable" class="value-table"></div>
        </article>
      </section>

      <section class="grid secondary-grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Feature Weight</h2>
          </div>
          <div id="importanceList" class="rank-list"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Match Factors</h2>
          </div>
          <div id="factorList" class="rank-list"></div>
        </article>

        <article class="panel wide">
          <div class="panel-head">
            <h2>Bankroll</h2>
          </div>
          <svg id="bankrollChart" viewBox="0 0 720 260" role="img"></svg>
        </article>

        <article class="panel wide">
          <div class="panel-head">
            <h2>Calibration</h2>
          </div>
          <svg id="calibrationChart" viewBox="0 0 720 260" role="img"></svg>
        </article>
      </section>

      <section class="grid table-grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Model Comparison</h2>
          </div>
          <div id="modelComparison" class="data-table"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Competitions</h2>
          </div>
          <div id="competitionTable" class="data-table"></div>
        </article>

        <article class="panel wide">
          <div class="panel-head">
            <h2>Team Rankings</h2>
          </div>
          <div id="teamTable" class="data-table scroll-table"></div>
        </article>

        <article class="panel wide">
          <div class="panel-head">
            <h2>Betting Ledger</h2>
          </div>
          <div id="bettingLedger" class="data-table scroll-table"></div>
        </article>
      </section>

      <section class="panel notes-panel">
        <div class="panel-head">
          <h2>Data Status</h2>
        </div>
        <ul id="notes"></ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
